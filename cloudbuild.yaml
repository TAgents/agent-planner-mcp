# Cloud Build configuration for planning-tools MCP Server
# Builds and deploys to Cloud Run in europe-north1 (Finland)

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/agent-platform/planning-tools-mcp:$_IMAGE_TAG'
      - '-t'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/agent-platform/planning-tools-mcp:latest'
      - '.'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/agent-platform/planning-tools-mcp'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'planning-tools-mcp'
      - '--image'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/agent-platform/planning-tools-mcp:$_IMAGE_TAG'
      - '--region'
      - 'europe-north1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'  # Public endpoint for MCP connector
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'NODE_ENV=production,MCP_TRANSPORT=http,MCP_SERVER_NAME=planning-tools,MCP_SERVER_VERSION=0.3.1'
      - '--set-secrets'
      - 'API_URL=AGENT_PLANNER_API_URL:latest,USER_API_TOKEN=AGENT_PLANNER_API_TOKEN:latest'

  # Set IAM policy to allow unauthenticated access
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'add-iam-policy-binding'
      - 'planning-tools-mcp'
      - '--region'
      - 'europe-north1'
      - '--member'
      - 'allUsers'
      - '--role'
      - 'roles/run.invoker'

images:
  - 'europe-north1-docker.pkg.dev/$PROJECT_ID/agent-platform/planning-tools-mcp:$_IMAGE_TAG'
  - 'europe-north1-docker.pkg.dev/$PROJECT_ID/agent-platform/planning-tools-mcp:latest'

# Substitutions allow for default values
substitutions:
  _IMAGE_TAG: 'latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
